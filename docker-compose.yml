services:
  db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: appdb
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./100k.txt:/data/100k.txt
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  web-app:
    build: .
    container_name: auth-web
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASS=secretpassword
      - DB_NAME=appdb
    depends_on:
      db:
        condition: service_healthy

  nginx-proxy:
    build: ./nginx
    container_name: secure-web-server
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASS=2400968@SIT.singaporetech.edu.sg
    depends_on:
      - web-app

  gitea-db:
    image: postgres:15-alpine
    container_name: gitea-db
    environment:
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: giteasecret
      POSTGRES_DB: gitea
    volumes:
      - gitea-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea -d gitea"]
      interval: 5s
      timeout: 5s
      retries: 10

  gitea:
    image: gitea/gitea:1.22
    container_name: gitea-server
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=giteasecret
      - GITEA__server__ROOT_URL=http://localhost:3300/
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__SSH_DOMAIN=localhost
      - GITEA__security__INSTALL_LOCK=true
    volumes:
      - gitea-data:/data
    ports:
      - "3300:3000"   # web UI: http://localhost:3300
      - "2222:22"     # git over SSH
    depends_on:
      gitea-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  gitea-init:
    image: gitea/gitea:1.22
    container_name: gitea-init
    entrypoint: ["/bin/sh", "/init/create-user.sh"]
    volumes:
      - gitea-data:/data
      - ./gitea/create-user.sh:/init/create-user.sh
    networks:
      - default
    depends_on:
      gitea:
        condition: service_healthy

  git-client:
    build:
      context: ./gitea
      dockerfile: git-client.Dockerfile
    container_name: git-client
    volumes:
      - ./gitea/repo:/repo
    depends_on:
      - gitea
    entrypoint: ["tail", "-f", "/dev/null"]

  # ==========================================
  # SonarQube Services
  # ==========================================

  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonarpassword
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 5s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube-server
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonarpassword
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    depends_on:
      sonarqube-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9000/api/system/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  sonarqube-init:
    image: curlimages/curl:latest
    container_name: sonarqube-init
    depends_on:
      sonarqube:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Updating SonarQube default admin password...' &&
        curl -s -u admin:admin -X POST 'http://sonarqube:9000/api/users/change_password?login=admin&previousPassword=admin&password=2400968@SIT.singaporetech.edu.sg' &&
        echo 'SonarQube admin password successfully updated!'
      "

  sonarqube-proxy:
    image: nginx:alpine
    container_name: sonarqube-ssl-proxy
    ports:
      - "9000:9000"
    depends_on:
      sonarqube:
        condition: service_healthy
    command: >
      sh -c "
        mkdir -p /etc/nginx/certs &&
        if [ ! -f /etc/nginx/certs/cert.pem ]; then
          apk add --no-cache openssl &&
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /etc/nginx/certs/key.pem \
            -out /etc/nginx/certs/cert.pem \
            -subj '/CN=127.0.0.1';
        fi &&
        echo 'server {
            listen 9000 ssl;
            server_name 127.0.0.1 localhost;
            ssl_certificate /etc/nginx/certs/cert.pem;
            ssl_certificate_key /etc/nginx/certs/key.pem;
            location / {
                proxy_pass http://sonarqube:9000;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
            }
        }' > /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'
      "

volumes:
  db-data:
  gitea-data:
  gitea-db-data:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs: