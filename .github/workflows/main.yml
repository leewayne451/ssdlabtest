name: CI - Security Scan & App Testing

on: [push, pull_request]

jobs:
  # ---------------------------------------------------------------------
  # 1. OWASP Dependency Check (from the supplied dependency-check.yml)
  # ---------------------------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "MyWebApp"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          # NVD now rate-limits anonymous requests heavily (scans can take
          # 30+ min or fail without a key). Request a free key at
          # https://nvd.nist.gov/developers/request-an-api-key and store it as
          # a repository secret named NVD_API_KEY.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: dependency-check-report

  # ---------------------------------------------------------------------
  # 2. ESLint static analysis (server.js and any other .js source files)
  # ---------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ESLint
        run: npm install --no-save eslint@8.57.0 eslint-plugin-security@3.0.1

      - name: Run ESLint (JSON report)
        id: eslint
        run: npx eslint . --ext .js -f json -o eslint-report.json
        continue-on-error: true

      - name: Print human-readable lint results
        if: always()
        run: npx eslint . --ext .js || true

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ESLint-Report
          path: eslint-report.json

      - name: Fail job if ESLint found issues
        if: steps.eslint.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------
  # 3. Integration tests (HTTP API) + UI tests (Selenium), run against the
  #    real app stack over plain HTTP on port 3000 (the app tier, bypassing
  #    the nginx TLS/basic-auth proxy).
  # ---------------------------------------------------------------------
  integration-and-ui-tests:
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://localhost:3000
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Expose web-app on localhost:3000 for testing
        run: |
          cat > docker-compose.override.yml <<'EOF'
          services:
            web-app:
              ports:
                - "3000:3000"
          EOF

      - name: Start db and web-app
        run: docker compose up -d --build db web-app

      - name: Wait for app to become ready over HTTP
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$BASE_URL/" > /dev/null; then
              echo "App is up after $i attempt(s)."
              exit 0
            fi
            echo "Waiting for app... (attempt $i/30)"
            sleep 3
          done
          echo "App did not become ready in time."
          docker compose logs
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Set up Chrome for Selenium
        uses: browser-actions/setup-chrome@v1

      - name: Run integration tests (HTTP API)
        run: pytest tests/test_integration.py -v

      - name: Run UI tests (Selenium)
        run: pytest tests/test_ui.py -v

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v
